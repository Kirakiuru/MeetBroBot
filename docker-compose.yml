services:
  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meetbro
      POSTGRES_PASSWORD: meetbro
      POSTGRES_DB: meetbro
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetbro"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No ports exposed — only accessible from bot container

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No ports exposed — only accessible from bot container

volumes:
  pgdata:
