name: CI

on:
  push:
    branches: [main, dev*]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock aiosqlite ruff

      - name: Lint with Ruff
        run: ruff check src/ tests/ --output-format=github

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          BOT_TOKEN: "0000000000:fake-token-for-ci"
